name: Daily Flight Data Collector

on:
  schedule:
    - cron: '0 5 * * *'  # 한국시간 오후 2시 (UTC 05:00)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6        # ✅ Node.js 24 지원 버전

      - name: Set up Python
        uses: actions/setup-python@v5        # ✅ Node.js 24 지원 버전
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flight collector
        run: python flight_collector.py
        env:
          API_KEY_ICN: ${{ secrets.API_KEY_ICN }}

      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add *.csv
          # 변경사항이 있을 때만 커밋 (에러 방지)
          git commit -m "Update flight data: $(date +'%Y-%m-%d')" || exit 0
          git push
